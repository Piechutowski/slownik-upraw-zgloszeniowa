    validations:
      required: true
  - type: input
    id: id-pozycji
    attributes:
      label: ID pozycji w słowniku
      description: Identyfikator konkretnej pozycji, jeśli dotyczy.
    validations:
      required: false
  - type: input
    id: nazwa-pozycji
    attributes:
      label: Nazwa pozycji
      description: Nazwa konkretnej pozycji, jeśli dotyczy.
    validations:
      required: false
  - type: dropdown
    id: typ-uwagi
    attributes:
      label: Typ uwagi
      options:
        - Dodanie
        - Usunięcie
        - Modyfikacja
    validations:
      required: true
  - type: textarea
    id: opis-problemu
    attributes:
      label: Opis problemu
      description: Opisz, czego dotyczy problem.
    validations:
      required: true
  - type: textarea
    id: proponowana-zmiana
    attributes:
      label: Proponowana zmiana
      description: Opisz proponowaną zmianę.
    validations:
      required: true
  - type: textarea
    id: uzasadnienie
    attributes:
      label: Uzasadnienie
      description: Uzasadnij proponowaną zmianę.
    validations:
      required: true
  - type: dropdown
    id: wplyw
    attributes:
      label: Wpływ
      description: Można wskazać więcej niż jeden obszar.
      multiple: true
      options:
        - Statystyka
        - Prawo i administracja
        - Rachunkowość
    validations:
      required: false
  - type: input
    id: email
    attributes:
      label: Adres e-mail zgłaszającego
      description: Pole pomocnicze. Zweryfikowaną tożsamością jest konto GitHub, z którego wysłano zgłoszenie.
      placeholder: jan.kowalski@example.com
    validations:
      required: false
