name: Generuj formularz ze słownika

# Po zmianie słownika lub generatora formularz jest przebudowywany i zatwierdzany
# z powrotem do repozytorium. Można też uruchomić ręcznie (workflow_dispatch).
on:
  push:
    branches: [main]
    paths:
      - data/slownik-upraw.csv
      - tools/genform.go
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generuj:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Zbuduj formularz ze słownika
        run: go run tools/genform.go

      - name: Zatwierdź zmiany formularza
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Aktualizacja formularza ze słownika upraw
          file_pattern: .github/ISSUE_TEMPLATE/zgloszenie-slownik-upraw.yml
